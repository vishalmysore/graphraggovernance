<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraphRAG Governance — AI Framework Alignment</title>
    <link rel="stylesheet" href="style.css?v=1">
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1>🏛️ GraphRAG Governance</h1>
            <p class="subtitle">AI Framework Alignment & Knowledge Graph Comparison</p>
        </header>

        <!-- Control Panel -->
        <div class="control-panel">
            <div class="control-row">
                <div class="control-group">
                    <label>Base Framework</label>
                    <select id="standardSelect">
                        <option value="EU AI Act">EU AI Act</option>
                        <option value="Singapore Model AI Governance">Singapore Model AI Governance</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>API Endpoint</label>
                    <input type="text" id="apiLink" value="https://integrate.api.nvidia.com/v1" placeholder="API endpoint URL">
                </div>
                <div class="control-group">
                    <label>API Key</label>
                    <input type="password" id="apiKey" placeholder="Enter API key">
                </div>
                <div class="control-group">
                    <label>Model</label>
                    <input type="text" id="model" value="nvidia/llama-3.3-nemotron-super-49b-v1" placeholder="Model name">
                </div>
            </div>

            <div class="control-row">
                <button id="btnLoadBase" class="btn btn-primary" onclick="loadBaseGraph()">📊 Load Base Framework</button>
                <button id="btnTestApi" class="btn btn-secondary" onclick="testApiConnection()">🔌 Test API</button>

                <div class="mock-toggle">
                    <label class="toggle-label">
                        <input type="checkbox" id="mockModeToggle" onchange="toggleMockMode()">
                        <span class="toggle-slider"></span>
                        Mock Mode (Sample Data)
                    </label>
                </div>
            </div>

            <!-- PDF Upload -->
            <div class="upload-section" id="uploadSection">
                <div class="drop-zone" id="dropZone">
                    <p>📄 Drop a governance framework PDF here or click to upload</p>
                    <input type="file" id="fileInput" accept=".pdf" onchange="handleFileUpload(event)" style="display:none">
                    <div class="upload-meta">
                        <input type="text" id="country" placeholder="Region/Jurisdiction (e.g., Singapore)" value="Singapore">
                        <input type="text" id="source" placeholder="Source name" value="Governance Framework">
                    </div>
                </div>
            </div>
        </div>

        <!-- Graph Display Area -->
        <div class="graph-area" id="graphArea" style="display:none;">
            <!-- Stats Bar -->
            <div class="stats-bar" id="statsBar">
                <span class="stat match">✅ Matches: <strong id="statMatches">0</strong></span>
                <span class="stat missing">❌ Missing: <strong id="statMissing">0</strong></span>
                <span class="stat extension">🔵 Extensions: <strong id="statExtensions">0</strong></span>
                <span class="stat conflict">⚠️ Conflicts: <strong id="statConflicts">0</strong></span>
                <span class="stat compliance">📊 Alignment: <strong id="statCompliance">0%</strong></span>
            </div>

            <!-- View Mode Selector -->
            <div class="view-controls">
                <label>View:</label>
                <select id="viewMode" onchange="switchView()">
                    <option value="base">Base Framework Only</option>
                    <option value="diff" selected>Comparison (Diff)</option>
                    <option value="overlay">Overlay</option>
                </select>
                <button class="btn btn-small" onclick="exportComparison()">📥 Export</button>
            </div>

            <!-- Graph Container -->
            <div id="graphContainer"></div>

            <!-- Inspector Panel -->
            <div id="inspector" class="inspector" style="display:none;">
                <div class="inspector-header">
                    <h3 id="inspectorTitle">Node Details</h3>
                    <button onclick="document.getElementById('inspector').style.display='none'">✕</button>
                </div>
                <div id="inspectorContent"></div>
            </div>
        </div>

        <!-- Status -->
        <div id="status" class="status-bar"></div>
    </div>

    <script src="app.js?v=1"></script>
</body>
</html>
